<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .player {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .play {
            background: #4CAF50;
            color: white;
        }

        .pause {
            background: #f44336;
            color: white;
        }

        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="player">
    <h2>🎵 Music Player</h2>

    <audio id="audio">
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <button class="play" onclick="playMusic()">▶ Play</button>
    <button class="pause" onclick="pauseMusic()">⏸ Pause</button>

    <br><br>

    <input type="range" id="progress" value="0">

    <p id="time">0:00 / 0:00</p>
</div>

<script>
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const time = document.getElementById("time");

function playMusic() {
    audio.play();
}

function pauseMusic() {
    audio.pause();
}

audio.addEventListener("timeupdate", () => {
    progress.max = audio.duration || 0;
    progress.value = audio.currentTime;

    let current = formatTime(audio.currentTime);
    let duration = formatTime(audio.duration || 0);

    time.textContent = `${current} / ${duration}`;
});

progress.addEventListener("input", () => {
    audio.currentTime = progress.value;
});

function formatTime(seconds) {
    let mins = Math.floor(seconds / 60) || 0;
    let secs = Math.floor(seconds % 60) || 0;
    return `${mins}:${secs.toString().padStart(2, "0")}`;
}
</script>

</body>
</html>
